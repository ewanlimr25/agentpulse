# Agent Attribute Registry
#
# Maps OTel span attribute names to AgentPulse internal semantic fields.
# Update this file when the OTel GenAI SIG renames or adds attributes —
# no code changes required.
#
# Priority: attributes are checked in order; first match wins.

# ── Span kind classification ──────────────────────────────────────────────────
#
# Determines the agent_span_kind field stored in ClickHouse.
# Values: llm.call | tool.call | agent.handoff | memory.read | memory.write |
#         mcp.tool_call | mcp.list_tools | unknown

span_kind_detection:
  # OTel GenAI SIG: gen_ai.operation.name is the current convention
  - attribute: "gen_ai.operation.name"
    value_map:
      "chat": "llm.call"
      "completion": "llm.call"
      "embeddings": "llm.call"
      "tool_call": "tool.call"
      "execute_tool": "tool.call"
      "handoff": "agent.handoff"
      "transfer": "agent.handoff"
      "memory_read": "memory.read"
      "memory_write": "memory.write"
      "mcp_tool_call": "mcp.tool_call"
      "mcp_list_tools": "mcp.list_tools"
      "mcp_server": "mcp.server"

  # AgentPulse explicit override — set this in your spans for unambiguous classification
  - attribute: "agentpulse.span.kind"
    passthrough: true
  - attribute: "agentpulse.span_kind"
    passthrough: true

  # Span name prefix heuristics (fallback)
  - attribute: "_span_name"
    prefix_map:
      "llm.": "llm.call"
      "tool.": "tool.call"
      "agent.handoff": "agent.handoff"
      "memory.read": "memory.read"
      "memory.write": "memory.write"
      "mcp.tool_call": "mcp.tool_call"
      "mcp.list_tools": "mcp.list_tools"
      "mcp.server": "mcp.server"

# ── Field extraction ──────────────────────────────────────────────────────────
#
# Maps internal field names to ordered lists of OTel attributes to check.
# First non-empty attribute value is used.

field_extraction:
  agent_name:
    - "agentpulse.agent.name"       # AgentPulse explicit
    - "gen_ai.agent.name"           # Anticipated future SIG attribute
    - "agent.name"                  # Common informal convention
    - "service.name"                # Fallback: use service name

  model_id:
    - "gen_ai.request.model"        # Current SIG convention
    - "gen_ai.model.id"             # Possible future SIG rename
    - "llm.model_name"              # Older LangChain convention
    - "model"                       # Minimal fallback

  input_tokens:
    - "gen_ai.usage.input_tokens"   # Current SIG convention
    - "gen_ai.usage.prompt_tokens"  # Older OpenAI convention
    - "llm.usage.prompt_tokens"

  output_tokens:
    - "gen_ai.usage.output_tokens"  # Current SIG convention
    - "gen_ai.usage.completion_tokens"
    - "llm.usage.completion_tokens"

  tool_name:
    - "agentpulse.tool.name"
    - "tool.name"
    - "gen_ai.tool.name"

  handoff_target:
    - "agentpulse.handoff.target_agent"
    - "agent.handoff.target"
    - "gen_ai.agent.handoff.target"

  memory_key:
    - "agentpulse.memory.key"
    - "memory.key"

  run_id:
    - "agentpulse.run.id"
    - "agentpulse.run_id"
    - "run.id"
    - "trace.run_id"

  project_id:
    - "agentpulse.project.id"
    - "agentpulse.project_id"

  session_id:
    - "agentpulse.session_id"         # AgentPulse explicit
    - "agentpulse.session.id"         # Alternative convention

  user_id:
    - "agentpulse.user_id"            # AgentPulse explicit
    - "agentpulse.user.id"            # Alternative AgentPulse convention
    - "enduser.id"                    # OTel semantic convention for end-user identity

  mcp_server_name:
    - "agentpulse.mcp.server_name"
    - "mcp.server.name"

  mcp_tool_name:
    - "agentpulse.mcp.tool_name"
    - "mcp.tool.name"

  mcp_input_schema:
    - "agentpulse.mcp.input_schema"

  mcp_output_schema:
    - "agentpulse.mcp.output_schema"

  mcp_tool_count:
    - "agentpulse.mcp.tool_count"

  mcp_discovered_tools:
    - "agentpulse.mcp.discovered_tools"

  mcp_session_id:
    - "agentpulse.mcp.session_id"
    - "mcp.session.id"

  mcp_request_id:
    - "agentpulse.mcp.request_id"
    - "mcp.request.id"

  mcp_client_name:
    - "agentpulse.mcp.client_name"
    - "mcp.client.name"

  mcp_transport:
    - "agentpulse.mcp.transport"
    - "mcp.transport"

# ── Cost computation ──────────────────────────────────────────────────────────
#
# How to compute cost when not provided explicitly.
# Loaded from model_pricing.yaml; this section controls the extraction logic.

cost:
  explicit_attribute: "agentpulse.cost_usd"   # Use this if present, skip computation
  pricing_config: "config/model_pricing.yaml"
