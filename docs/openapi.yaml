              type: object
              description: Subscription endpoint to unregister
              required: [endpoint]
              properties:
                endpoint:
                  type: string
                  format: uri
      responses:
        "204":
          description: Push subscription removed
        "401":
          $ref: "#/components/responses/Unauthorized"

