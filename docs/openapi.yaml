# Hand-written spec — generated from router.go inspection. Run openapi-generator or redoc to render.
openapi: "3.1.0"

info:
  title: AgentPulse API
  version: "1.0.0"
  description: >
    OpenTelemetry-native observability platform for multi-agent AI systems.
    Provides unified traces, cost tracking, evaluations, and alerting for AI agent workloads.

servers:
  - url: http://localhost:8080
    description: Local development
  - url: https://your-deployment.example.com
    description: Production (replace with your deployment URL)

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: >
        Per-project API key. Pass as `Authorization: Bearer <project_api_key>`.
        Used for all project-scoped read operations and most mutations.
    AdminKeyAuth:
      type: http
      scheme: bearer
      description: >
        Admin-level key with elevated privileges. Pass as `Authorization: Bearer <admin_key>`.
        Required for settings writes, loop-config writes, and storage mutations.

  parameters:
    projectID:
      name: projectID
      in: path
      required: true
      schema:
        type: string
      description: Unique identifier for the project
    runID:
      name: runID
      in: path
      required: true
      schema:
        type: string
      description: Unique identifier for the run
    spanID:
      name: spanID
      in: path
      required: true
      schema:
        type: string
      description: Unique identifier for the span
    ruleID:
      name: ruleID
      in: path
      required: true
      schema:
        type: string
      description: Unique identifier for the rule
    configID:
      name: configID
      in: path
      required: true
      schema:
        type: string
      description: Unique identifier for the eval config
    sessionID:
      name: sessionID
      in: path
      required: true
      schema:
        type: string
      description: Unique identifier for the session
    userID:
      name: userID
      in: path
      required: true
      schema:
        type: string
      description: Unique identifier for the user
    tokenID:
      name: tokenID
      in: path
      required: true
      schema:
        type: string
      description: Unique identifier for the ingest token
    jobID:
      name: jobID
      in: path
      required: true
      schema:
        type: string
      description: Unique identifier for the storage purge job
    variantID:
      name: variantID
      in: path
      required: true
      schema:
        type: string
      description: Unique identifier for a playground session variant
    tag:
      name: tag
      in: path
      required: true
      schema:
        type: string
      description: Tag value string

  responses:
    Unauthorized:
      description: Missing or invalid authentication credentials
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
                example: unauthorized
    NotFound:
      description: The requested resource was not found
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
                example: not found
    BadRequest:
      description: Invalid request body or parameters
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
                example: invalid request
    TooManyRequests:
      description: Rate limit exceeded
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
                example: rate limit exceeded

tags:
  - name: Misc
    description: Health checks and global utility endpoints
  - name: Projects
    description: Project management — create and inspect projects
  - name: Runs
    description: Agent run records — spans, loops, replay, topology, tags, annotations
  - name: Spans
    description: Individual OTel spans within a run, including feedback
  - name: Evals
    description: Evaluation configs, summaries, baselines, and dry-runs
  - name: Budget
    description: Budget rules and cost alert management
  - name: Alerts
    description: Alert rules and recent alert events
  - name: Analytics
    description: Aggregated cost, latency, success-rate, and volume metrics
  - name: Sessions
    description: User session tracking across runs
  - name: Users
    description: End-user cost and activity attribution
  - name: IngestTokens
    description: Per-project ingest token management (write-path auth)
  - name: Storage
    description: Storage stats, retention policy, and purge operations
  - name: Playground
    description: Interactive LLM playground for prompt experimentation
  - name: Notifications
    description: Push subscriptions and email digest settings
  - name: LoopConfig
    description: Loop detector configuration (read via BearerAuth, write via AdminKeyAuth)
  - name: Settings
    description: Project-level settings (read via BearerAuth, write via AdminKeyAuth)

paths:

  # ---------------------------------------------------------------------------
  # Health
  # ---------------------------------------------------------------------------

  /healthz:
    get:
      summary: Service health check
      operationId: getHealth
      tags: [Misc]
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok

  # ---------------------------------------------------------------------------
  # Projects (public — no auth)
  # ---------------------------------------------------------------------------

  /api/v1/projects:
    get:
      summary: List all projects
      operationId: listProjects
      tags: [Projects]
      responses:
        "200":
          description: Array of project summaries
        "401":
          $ref: "#/components/responses/Unauthorized"

    post:
      summary: Create a new project
      operationId: createProject
      tags: [Projects]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Project creation payload — name, optional description, optional settings
              required: [name]
              properties:
                name:
                  type: string
                  example: my-agent-project
                description:
                  type: string
      responses:
        "201":
          description: Project created — returns full project object including generated API key
        "400":
          $ref: "#/components/responses/BadRequest"

  # ---------------------------------------------------------------------------
  # Project-scoped (BearerAuth)
  # ---------------------------------------------------------------------------

  /api/v1/projects/{projectID}:
    get:
      summary: Get project details
      operationId: getProject
      tags: [Projects]
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/projectID"
      responses:
        "200":
          description: Project details including metadata and settings
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/projects/{projectID}/runs:
    get:
      summary: List runs for a project
      operationId: listProjectRuns
      tags: [Runs]
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/projectID"
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
        - name: status
          in: query
          schema:
            type: string
            enum: [running, completed, failed]
        - name: from
          in: query
          schema:
            type: string
            format: date-time
          description: Filter runs started after this timestamp (RFC 3339)
        - name: to
          in: query
          schema:
            type: string
            format: date-time
          description: Filter runs started before this timestamp (RFC 3339)
        - name: tags
          in: query
          schema:
            type: string
          description: Comma-separated list of tags to filter by
      responses:
        "200":
          description: Paginated list of runs with summary stats
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/projects/{projectID}/runs/compare:
    get:
      summary: Compare two or more runs side-by-side
      operationId: compareRuns
      tags: [Runs]
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/projectID"
        - name: runIDs
          in: query
          required: true
          schema:
            type: string
          description: Comma-separated list of run IDs to compare
      responses:
        "200":
          description: Comparison payload including metrics delta, span counts, and cost diff
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/projects/{projectID}/runs/compare/prompt-diff:
    get:
      summary: Show prompt-level diff between two runs
      operationId: compareRunsPromptDiff
      tags: [Runs]
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/projectID"
        - name: runA
          in: query
          required: true
          schema:
            type: string
          description: First run ID
        - name: runB
          in: query
          required: true
          schema:
            type: string
          description: Second run ID
      responses:
        "200":
          description: Unified diff of prompt messages between the two runs
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ---------------------------------------------------------------------------
  # Evals (project-scoped)
  # ---------------------------------------------------------------------------

  /api/v1/projects/{projectID}/evals/summary:
    get:
      summary: Get evaluation summary for a project
      operationId: getEvalsSummary
      tags: [Evals]
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/projectID"
        - name: from
          in: query
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: Aggregated eval scores, pass/fail counts, and trend data
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/projects/{projectID}/evals/baseline:
    get:
      summary: Get eval baseline snapshot
      operationId: getEvalsBaseline
      tags: [Evals]
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/projectID"
      responses:
        "200":
          description: Baseline eval metrics used for regression comparison
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/projects/{projectID}/evals/config:
    get:
      summary: List eval configs for a project
      operationId: listEvalConfigs
      tags: [Evals]
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/projectID"
      responses:
        "200":
          description: Array of eval configuration objects
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

    post:
      summary: Create an eval config
      operationId: createEvalConfig
      tags: [Evals]
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/projectID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: >
                Eval config payload — name, scorer type (llm_judge, regex, exact_match),
                prompt template, pass threshold, and optional schedule
              required: [name, scorer_type]
              properties:
                name:
                  type: string
                scorer_type:
                  type: string
                  enum: [llm_judge, regex, exact_match, semantic_similarity]
                prompt_template:
                  type: string
                pass_threshold:
                  type: number
                  format: float
      responses:
        "201":
          description: Eval config created — returns full config object with generated ID
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/projects/{projectID}/evals/config/{configID}:
    get:
      summary: Get a specific eval config
      operationId: getEvalConfig
      tags: [Evals]
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/projectID"
        - $ref: "#/components/parameters/configID"
      responses:
        "200":
          description: Eval config details
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

    put:
      summary: Update an eval config
      operationId: updateEvalConfig
      tags: [Evals]
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/projectID"
        - $ref: "#/components/parameters/configID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Partial or full eval config update payload
      responses:
        "200":
          description: Updated eval config
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      summary: Delete an eval config
      operationId: deleteEvalConfig
      tags: [Evals]
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/projectID"
        - $ref: "#/components/parameters/configID"
      responses:
        "204":
          description: Eval config deleted successfully
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/projects/{projectID}/evals/config/dry-run:
    post:
      summary: Dry-run an eval config against recent spans
      operationId: dryRunEvalConfig
      tags: [Evals]
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/projectID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: >
                Eval config to test (same shape as createEvalConfig) plus optional
                sample_size and span_filter to scope the dry-run
              properties:
                config:
                  type: object
                  description: Inline eval config (same fields as createEvalConfig)
                sample_size:
                  type: integer
                  default: 10
                span_filter:
                  type: object
                  description: Optional filter to scope which spans are sampled
      responses:
        "200":
          description: Dry-run results — per-span scores, pass/fail breakdown, estimated cost
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ---------------------------------------------------------------------------
  # Budget (project-scoped)
  # ---------------------------------------------------------------------------

  /api/v1/projects/{projectID}/budget/rules:
    get:
      summary: List budget rules for a project
      operationId: listBudgetRules
      tags: [Budget]
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/projectID"
      responses:
        "200":
          description: Array of budget rules with limits, windows, and action configs
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

    post:
      summary: Create a budget rule
      operationId: createBudgetRule
      tags: [Budget]
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/projectID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: >
                Budget rule — limit_usd, window (hourly/daily/monthly), action (alert/block),
                optional webhook_url with HMAC signing config
              required: [limit_usd, window, action]
              properties:
                limit_usd:
                  type: number
                  format: float
                window:
                  type: string
                  enum: [hourly, daily, monthly]
                action:
                  type: string
                  enum: [alert, block]
                webhook_url:
                  type: string
                  format: uri
      responses:
        "201":
          description: Budget rule created
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/projects/{projectID}/budget/rules/{ruleID}:
    get:
      summary: Get a budget rule
      operationId: getBudgetRule
      tags: [Budget]
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/projectID"
        - $ref: "#/components/parameters/ruleID"
      responses:
        "200":
          description: Budget rule details
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

    put:
      summary: Update a budget rule
      operationId: updateBudgetRule
      tags: [Budget]
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/projectID"
        - $ref: "#/components/parameters/ruleID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Partial or full budget rule update payload
      responses:
        "200":
          description: Updated budget rule
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      summary: Delete a budget rule
      operationId: deleteBudgetRule
      tags: [Budget]
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/projectID"
        - $ref: "#/components/parameters/ruleID"
      responses:
        "204":
          description: Budget rule deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/projects/{projectID}/budget/alerts/recent:
    get:
      summary: Get recent budget alert events
      operationId: getRecentBudgetAlerts
      tags: [Budget]
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/projectID"
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: List of recent budget alert events with triggered rule and cost snapshot
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  # ---------------------------------------------------------------------------
  # Alerts (project-scoped)
  # ---------------------------------------------------------------------------

  /api/v1/projects/{projectID}/alerts/rules:
    get:
      summary: List alert rules for a project
      operationId: listAlertRules
      tags: [Alerts]
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/projectID"
      responses:
        "200":
          description: Array of alert rules with conditions and notification channel configs
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

    post:
      summary: Create an alert rule
      operationId: createAlertRule
      tags: [Alerts]
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/projectID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: >
                Alert rule — metric (error_rate, latency_p95, cost), condition, threshold,
                window_seconds, notification channels (webhook, email, push)
              required: [metric, condition, threshold]
              properties:
                metric:
                  type: string
                  enum: [error_rate, latency_p95, cost, token_count]
                condition:
                  type: string
                  enum: [gt, lt, gte, lte]
                threshold:
                  type: number
                  format: float
                window_seconds:
                  type: integer
                notification_channels:
                  type: array
                  items:
                    type: object
      responses:
        "201":
          description: Alert rule created
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/projects/{projectID}/alerts/rules/{ruleID}:
    get:
      summary: Get an alert rule
      operationId: getAlertRule
      tags: [Alerts]
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/projectID"
        - $ref: "#/components/parameters/ruleID"
      responses:
        "200":
          description: Alert rule details
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

    put:
      summary: Update an alert rule
      operationId: updateAlertRule
      tags: [Alerts]
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/projectID"
        - $ref: "#/components/parameters/ruleID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Partial or full alert rule update payload
      responses:
        "200":
          description: Updated alert rule
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      summary: Delete an alert rule
      operationId: deleteAlertRule
      tags: [Alerts]
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/projectID"
        - $ref: "#/components/parameters/ruleID"
      responses:
        "204":
          description: Alert rule deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/projects/{projectID}/alerts/events/recent:
    get:
      summary: Get recent alert events
      operationId: getRecentAlertEvents
      tags: [Alerts]
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/projectID"
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: List of recent alert events with triggered rule and snapshot
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  # ---------------------------------------------------------------------------
  # Analytics (project-scoped)
  # ---------------------------------------------------------------------------

  /api/v1/projects/{projectID}/analytics/cost:
    get:
      summary: Get cost analytics time series
      operationId: getAnalyticsCost
      tags: [Analytics]
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/projectID"
        - name: from
          in: query
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          schema:
            type: string
            format: date-time
        - name: granularity
          in: query
          schema:
            type: string
            enum: [minute, hour, day]
            default: hour
      responses:
        "200":
          description: Cost time series bucketed by granularity, plus total and per-model breakdown
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/projects/{projectID}/analytics/latency:
    get:
      summary: Get latency analytics time series
      operationId: getAnalyticsLatency
      tags: [Analytics]
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/projectID"
        - name: from
          in: query
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          schema:
            type: string
            format: date-time
        - name: granularity
          in: query
          schema:
            type: string
            enum: [minute, hour, day]
            default: hour
        - name: percentiles
          in: query
          schema:
            type: string
            default: "p50,p95,p99"
          description: Comma-separated list of percentiles to return
      responses:
        "200":
          description: Latency percentile time series
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/projects/{projectID}/analytics/success-rate:
    get:
      summary: Get success rate analytics time series
      operationId: getAnalyticsSuccessRate
      tags: [Analytics]
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/projectID"
        - name: from
          in: query
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          schema:
            type: string
            format: date-time
        - name: granularity
          in: query
          schema:
            type: string
            enum: [minute, hour, day]
            default: hour
      responses:
        "200":
          description: Success/failure rate time series
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/projects/{projectID}/analytics/volume:
    get:
      summary: Get request volume analytics time series
      operationId: getAnalyticsVolume
      tags: [Analytics]
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/projectID"
        - name: from
          in: query
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          schema:
            type: string
            format: date-time
        - name: granularity
          in: query
          schema:
            type: string
            enum: [minute, hour, day]
            default: hour
      responses:
        "200":
          description: Span/run volume time series with token throughput
        "401":
