          application/json:
            schema:
              type: object
              description: Variant update — name, system_prompt, model, temperature, max_tokens
      responses:
        "200":
          description: Updated variant
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/projects/{projectID}/playground/sessions/{sessionID}/variants/{variantID}/run:
    post:
      summary: Execute a playground variant with a prompt
      operationId: runPlaygroundVariant
      tags: [Playground]
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/projectID"
        - $ref: "#/components/parameters/sessionID"
        - $ref: "#/components/parameters/variantID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Execution payload — messages array, optional overrides for temperature/max_tokens
              required: [messages]
              properties:
                messages:
                  type: array
                  items:
                    type: object
                    properties:
                      role:
                        type: string
                        enum: [user, assistant]
                      content:
                        type: string
                temperature:
                  type: number
                  format: float
                max_tokens:
                  type: integer
      responses:
        "200":
          description: LLM completion result with token usage and latency
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  # ---------------------------------------------------------------------------
  # Run-scoped routes (RunAuth — Bearer validates against run's project)
  # ---------------------------------------------------------------------------

  /api/v1/runs/{runID}:
    get:
      summary: Get run details
      operationId: getRun
      tags: [Runs]
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/runID"
      responses:
        "200":
          description: Run details — status, span count, cost, latency, metadata
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/runs/{runID}/spans:
    get:
      summary: List spans for a run
      operationId: listRunSpans
      tags: [Spans]
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/runID"
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
        - name: span_kind
          in: query
          schema:
            type: string
          description: Filter by OTel span kind (llm, tool, agent, etc.)
      responses:
        "200":
          description: Paginated list of spans for the run
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/runs/{runID}/spans/{spanID}:
    get:
      summary: Get a specific span
      operationId: getRunSpan
      tags: [Spans]
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/runID"
        - $ref: "#/components/parameters/spanID"
      responses:
        "200":
          description: Full span detail including attributes, events, and links
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/runs/{runID}/replay-bundle:
    get:
      summary: Download replay bundle for a run
      operationId: getRunReplayBundle
      tags: [Runs]
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/runID"
      responses:
        "200":
          description: >
            Replay bundle archive (zip/tar) containing all spans, prompts, and tool calls
            sufficient to replay or audit the run
          content:
            application/zip:
              schema:
                type: string
                format: binary
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/runs/{runID}/evals:
    get:
      summary: List eval results for a run
      operationId: getRunEvals
      tags: [Evals]
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/runID"
      responses:
        "200":
          description: Flat list of eval results for each scored span in the run
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/runs/{runID}/evals/grouped:
    get:
      summary: Get eval results grouped by scorer
      operationId: getRunEvalsGrouped
      tags: [Evals]
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/runID"
      responses:
        "200":
          description: Eval results grouped by scorer config with aggregate pass rate per scorer
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/runs/{runID}/loops:
    get:
      summary: Get detected loops for a run
      operationId: getRunLoops
      tags: [Runs]
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/runID"
      responses:
        "200":
          description: >
            List of detected loop events — span ID where loop was detected,
            iteration count, similarity scores, and timestamps
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/runs/{runID}/live:
    get:
      summary: Server-Sent Events stream for live run updates
      operationId: getRunLiveStream
      tags: [Runs]
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/runID"
      responses:
        "200":
          description: >
            SSE stream for a running agent — events: span.started, span.completed,
            loop.detected, run.completed. Closes when run ends.
          content:
            text/event-stream:
              schema:
                type: string
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/runs/{runID}/topology/graph:
    get:
      summary: Get agent topology graph for a run
      operationId: getRunTopologyGraph
      tags: [Runs]
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/runID"
      responses:
        "200":
          description: >
            Topology graph as nodes + edges (React Flow compatible) —
            nodes represent agents/tools, edges represent invocation relationships
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/runs/{runID}/tags:
    post:
      summary: Add tags to a run
      operationId: addRunTags
      tags: [Runs]
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/runID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Tags to add to this run
              required: [tags]
              properties:
                tags:
                  type: array
                  items:
                    type: string
      responses:
        "200":
          description: Updated tag list for the run
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

    get:
      summary: List tags for a run
      operationId: listRunTags
      tags: [Runs]
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/runID"
      responses:
        "200":
          description: Array of tag strings attached to this run
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/runs/{runID}/tags/{tag}:
    delete:
      summary: Remove a tag from a run
      operationId: deleteRunTag
      tags: [Runs]
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/runID"
        - $ref: "#/components/parameters/tag"
      responses:
        "204":
          description: Tag removed
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/runs/{runID}/annotation:
    put:
      summary: Set or update annotation for a run
      operationId: putRunAnnotation
      tags: [Runs]
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/runID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Run annotation — free-text note or structured label
              required: [text]
              properties:
                text:
                  type: string
                  maxLength: 5000
      responses:
        "200":
          description: Annotation saved
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      summary: Delete annotation from a run
      operationId: deleteRunAnnotation
      tags: [Runs]
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/runID"
      responses:
        "204":
          description: Annotation deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  # ---------------------------------------------------------------------------
  # Global routes
  # ---------------------------------------------------------------------------

  /api/v1/models:
    get:
      summary: List available models (requires playground to be configured)
      operationId: listModels
      tags: [Playground]
      responses:
        "200":
          description: Array of available model identifiers with capability flags
        "503":
          description: Playground not configured on this deployment

  /api/v1/ws/alerts:
    get:
      summary: WebSocket stream for real-time alert events (all projects the key has access to)
      operationId: wsAlerts
      tags: [Alerts]
      security:
        - BearerAuth: []
      parameters:
        - name: Upgrade
          in: header
          required: true
          schema:
            type: string
            enum: [websocket]
        - name: Connection
          in: header
          required: true
          schema:
            type: string
            enum: [Upgrade]
      responses:
        "101":
          description: >
            WebSocket upgrade — once connected, server pushes JSON alert event frames
            (same schema as alert events from /alerts/events/recent) in real time
        "401":
          $ref: "#/components/responses/Unauthorized"
