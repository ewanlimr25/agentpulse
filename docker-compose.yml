services:
  clickhouse:
    image: clickhouse/clickhouse-server:24.8-alpine
    container_name: agentpulse-clickhouse
    ports:
      - "8123:8123"   # HTTP interface
      - "9000:9000"   # Native TCP interface
    environment:
      CLICKHOUSE_DB: agentpulse
      CLICKHOUSE_USER: agentpulse
      CLICKHOUSE_PASSWORD: agentpulse
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./migrations/clickhouse:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres:
    image: postgres:16-alpine
    container_name: agentpulse-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: agentpulse
      POSTGRES_USER: agentpulse
      POSTGRES_PASSWORD: agentpulse
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentpulse"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: agentpulse-minio
    ports:
      - "9090:9000"   # S3 API
      - "9091:9001"   # Console
    environment:
      MINIO_ROOT_USER: agentpulse
      MINIO_ROOT_PASSWORD: agentpulse
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  collector:
    build:
      context: ./collector
      dockerfile: Dockerfile
    container_name: agentpulse-collector
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "13133:13133" # Health check
      - "8888:8888"   # Collector metrics
    environment:
      CLICKHOUSE_ENDPOINT: "clickhouse://agentpulse:agentpulse@clickhouse:9000/agentpulse"
      CLICKHOUSE_DATABASE: "agentpulse"
      POSTGRES_DSN: "postgres://agentpulse:agentpulse@postgres:5432/agentpulse?sslmode=disable"
    volumes:
      - ./config/agent_attributes.yaml:/etc/agentpulse/agent_attributes.yaml:ro
      - ./config/model_pricing.yaml:/etc/agentpulse/model_pricing.yaml:ro
    depends_on:
      clickhouse:
        condition: service_healthy
      postgres:
        condition: service_healthy
    profiles: ["full"] # Only start with: docker compose --profile full up

  minio-init:
    image: minio/mc:latest
    container_name: agentpulse-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 agentpulse agentpulse;
      mc mb --ignore-existing local/agentpulse-spans;
      exit 0;
      "

volumes:
  clickhouse_data:
  postgres_data:
  minio_data:
