version: "3.9"

services:
  clickhouse:
    image: clickhouse/clickhouse-server:24.8-alpine
    container_name: agentpulse-clickhouse
    ports:
      - "8123:8123"   # HTTP interface
      - "9000:9000"   # Native TCP interface
    environment:
      CLICKHOUSE_DB: agentpulse
      CLICKHOUSE_USER: agentpulse
      CLICKHOUSE_PASSWORD: agentpulse
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./migrations/clickhouse:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres:
    image: postgres:16-alpine
    container_name: agentpulse-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: agentpulse
      POSTGRES_USER: agentpulse
      POSTGRES_PASSWORD: agentpulse
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentpulse"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: agentpulse-minio
    ports:
      - "9090:9000"   # S3 API
      - "9091:9001"   # Console
    environment:
      MINIO_ROOT_USER: agentpulse
      MINIO_ROOT_PASSWORD: agentpulse
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:latest
    container_name: agentpulse-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 agentpulse agentpulse;
      mc mb --ignore-existing local/agentpulse-spans;
      exit 0;
      "

volumes:
  clickhouse_data:
  postgres_data:
  minio_data:
